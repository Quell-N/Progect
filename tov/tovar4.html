<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электрическая гитара</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <aside>
            <header></header>
            <footer></footer>
        </aside>
        <main>
            <div class="product-detail">
                <div class="product-detail__image">
                    <img src="/assets/tov/3.jpg" alt="электро гитара">
                </div>
                <div class="product-detail__info">
                    <h1>Электрическая гитара Yamaha F310</h1>
                    <div class="product-detail__rating">★★★★☆ 4.8 (10 отзывов)</div>
                    <div class="product-detail__price">20 700 ₽</div>
                    <div class="product-detail__description">
                        <p>Классическая электро гитара для начинающих и профессионалов. 
                        Корпус из дерева, качественный звук, удобный гриф.</p>
                        <p>Характеристики:
                            <ul>
                                <li>Тип: Электрическая</li>
                                <li>Размер: 4/4</li>
                                <li>Верхняя дека: пластмасса</li>
                                <li>Гриф: нато</li>
                            </ul>
                        </p>
                    </div>
                    <button class="product-detail__btn">Добавить в корзину</button>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/script.js" type="module"></script>
</body>
</html>
